<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" font-family="SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">joey@nyc terminal — self-taught builder shipping CLI tools, MCP servers, macOS apps, AI agents, and a DGX Spark fleet</title>
  <defs>
    <clipPath id="panelClip"><rect x="2" y="2" width="876" height="296" rx="12"/></clipPath>
    <clipPath id="type1"><rect class="t1" x="153" y="76" width="54" height="22"/></clipPath>
    <clipPath id="type2"><rect class="t2" x="153" y="136" width="117" height="22"/></clipPath>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DFF3B" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7DFF3B" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#7DFF3B" stop-opacity="0"/>
    </linearGradient>
    <pattern id="scanlines" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#000000" opacity="0.28"/>
    </pattern>
    <polygon id="hex" points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"/>
  </defs>

  <style>
    text { font-size: 15px; }
    .prm { fill: #4A8C2E; }
    .txt { fill: #B8EB9E; }
    .grn { fill: #7DFF3B; }
    .amb { fill: #C4A359; }
    .mut { fill: #597A59; }

    .scene   { animation: scene 12s linear infinite; }
    .t1      { animation: t1  12s steps(6,end)  infinite; }
    .t2      { animation: t2  12s steps(13,end) infinite; }
    .c1      { animation: c1w 12s linear infinite; }
    .c1 rect { animation: c1x 12s steps(6,end)  infinite; }
    .c2      { animation: c2w 12s linear infinite; }
    .c2 rect { animation: c2x 12s steps(13,end) infinite; }
    .c3      { animation: c3w 12s linear infinite; }
    .blink   { animation: blink 1.1s steps(1,end) infinite; }
    .l2      { animation: showA 12s linear infinite; }
    .l3      { animation: showB 12s linear infinite; }
    .i1 { animation: showI1 12s linear infinite; }
    .i2 { animation: showI2 12s linear infinite; }
    .i3 { animation: showI3 12s linear infinite; }
    .i4 { animation: showI4 12s linear infinite; }
    .i5 { animation: showI5 12s linear infinite; }
    .l5      { animation: showC 12s linear infinite; }
    .cmt     { animation: showD 12s linear infinite; }
    .sweep   { animation: sweep 7s linear infinite; }
    .hx      { animation: pulse 3.6s ease-in-out infinite; }
    .hxa     { animation: pulseA 5s ease-in-out infinite; }
    .dot     { animation: pulse 2.4s ease-in-out infinite; }

    @keyframes scene { 0%, 94% { opacity: 1; } 98%, 100% { opacity: 0; } }
    @keyframes t1  { 0%, 8%  { width: 0; } 16%, 100% { width: 54;  } }
    @keyframes t2  { 0%, 30% { width: 0; } 42%, 100% { width: 117; } }
    @keyframes c1x { 0%, 8%  { x: 153; }  16%, 100% { x: 207; } }
    @keyframes c2x { 0%, 30% { x: 153; }  42%, 100% { x: 270; } }
    @keyframes c1w { 0%, 25% { opacity: 1; } 26%, 100% { opacity: 0; } }
    @keyframes c2w { 0%, 25% { opacity: 0; } 26%, 43% { opacity: 1; } 44%, 100% { opacity: 0; } }
    @keyframes c3w { 0%, 66% { opacity: 0; } 68%, 100% { opacity: 1; } }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    @keyframes showA  { 0%, 18% { opacity: 0; } 21%, 100% { opacity: 1; } }
    @keyframes showB  { 0%, 24% { opacity: 0; } 26%, 100% { opacity: 1; } }
    @keyframes showI1 { 0%, 45% { opacity: 0; } 47%, 100% { opacity: 1; } }
    @keyframes showI2 { 0%, 49% { opacity: 0; } 51%, 100% { opacity: 1; } }
    @keyframes showI3 { 0%, 53% { opacity: 0; } 55%, 100% { opacity: 1; } }
    @keyframes showI4 { 0%, 57% { opacity: 0; } 59%, 100% { opacity: 1; } }
    @keyframes showI5 { 0%, 61% { opacity: 0; } 63%, 100% { opacity: 1; } }
    @keyframes showC  { 0%, 66% { opacity: 0; } 68%, 100% { opacity: 1; } }
    @keyframes showD  { 0%, 63% { opacity: 0; } 66%, 100% { opacity: 1; } }
    @keyframes sweep { 0% { transform: translateY(-120px); } 100% { transform: translateY(320px); } }
    @keyframes pulse  { 0%, 100% { fill-opacity: 0.10; } 50% { fill-opacity: 0.45; } }
    @keyframes pulseA { 0%, 100% { fill-opacity: 0.12; } 50% { fill-opacity: 0.50; } }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
      .c1, .c2 { opacity: 0 !important; }
    }
  </style>

  <!-- panel -->
  <rect x="2" y="2" width="876" height="296" rx="12" fill="#0A0E0A" stroke="#334D33" stroke-width="2"/>

  <!-- title bar -->
  <circle cx="30" cy="28" r="6" fill="#FF4566" opacity="0.85"/>
  <circle cx="52" cy="28" r="6" fill="#C4A359" opacity="0.85"/>
  <circle cx="74" cy="28" r="6" fill="#7DFF3B" opacity="0.85"/>
  <text x="440" y="33" text-anchor="middle" class="mut" font-size="13">joey@nyc — zsh — 80×24</text>
  <line x1="2" y1="50" x2="878" y2="50" stroke="#1F2E1F" stroke-width="1.5"/>

  <g class="scene">
    <!-- line 1: whoami -->
    <text x="36" y="92" class="prm" textLength="108">joey@nyc:~ $</text>
    <g clip-path="url(#type1)">
      <text x="153" y="92" class="txt" textLength="54">whoami</text>
    </g>
    <g class="c1"><rect x="153" y="79" width="9" height="17" fill="#7DFF3B" class="blink"/></g>

    <!-- line 2: output -->
    <text x="36" y="122" class="l2"><tspan class="grn">self-taught builder</tspan><tspan class="txt"> — nyc · no CS degree, no bootcamp</tspan></text>

    <!-- line 3: ls -->
    <g class="l3">
      <text x="36" y="152" class="prm" textLength="108">joey@nyc:~ $</text>
    </g>
    <g clip-path="url(#type2)">
      <text x="153" y="152" class="txt" textLength="117">ls ~/projects</text>
    </g>
    <g class="c2"><rect x="153" y="139" width="9" height="17" fill="#7DFF3B" class="blink"/></g>

    <!-- line 4: ls output -->
    <text x="36"  y="182" class="grn i1" textLength="81">cli-tools</text>
    <text x="135" y="182" class="grn i2" textLength="99">mcp-servers</text>
    <text x="252" y="182" class="grn i3" textLength="90">macos-apps</text>
    <text x="360" y="182" class="grn i4" textLength="81">ai-agents</text>
    <text x="459" y="182" class="amb i5" textLength="135">dgx-spark-fleet</text>

    <!-- line 5: idle prompt -->
    <g class="l5">
      <text x="36" y="212" class="prm" textLength="108">joey@nyc:~ $</text>
    </g>
    <g class="c3"><rect x="153" y="199" width="9" height="17" fill="#7DFF3B" class="blink"/></g>

    <!-- footer comment -->
    <text x="36" y="266" class="mut cmt" font-size="13"># built with claude code · codex · opencode · hermes · openclaw</text>
  </g>

  <!-- hex fleet -->
  <g transform="translate(735,150)" stroke="#334D33" stroke-width="1.5">
    <use href="#hex" fill="#7DFF3B" class="hx"  style="animation-delay:-0.0s"/>
    <use href="#hex" x="-48" y="0"   fill="#7DFF3B" class="hx" style="animation-delay:-0.6s"/>
    <use href="#hex" x="48"  y="0"   fill="#7DFF3B" class="hx" style="animation-delay:-1.2s"/>
    <use href="#hex" x="-24" y="-41" fill="#7DFF3B" class="hx" style="animation-delay:-1.8s"/>
    <use href="#hex" x="24"  y="-41" fill="#7DFF3B" class="hx" style="animation-delay:-2.4s"/>
    <use href="#hex" x="-24" y="41"  fill="#7DFF3B" class="hx" style="animation-delay:-3.0s"/>
    <use href="#hex" x="24"  y="41"  fill="#C4A359" class="hxa"/>
  </g>
  <circle cx="672" cy="242" r="4" fill="#7DFF3B" fill-opacity="0.4" class="dot"/>
  <text x="684" y="246" class="mut" font-size="12">GPU FLEET · ONLINE</text>

  <!-- CRT overlays -->
  <g clip-path="url(#panelClip)" pointer-events="none">
    <rect x="2" y="2" width="876" height="296" fill="url(#scanlines)"/>
    <rect x="2" y="-120" width="876" height="120" fill="url(#sweepGrad)" class="sweep"/>
  </g>
</svg>
